name: Refresh product data

on:
  schedule:
    - cron: '23 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Fetch retailer catalogs
        env:
          BESTBUY_API_KEY: ${{ secrets.BESTBUY_API_KEY }}
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
        run: node scripts/fetch-products.mjs
      - name: Commit updated catalog
        run: |
          if git diff --quiet public/products.json; then
            echo "Catalog unchanged — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/products.json
          git commit -m "Refresh product catalog"
          git push
